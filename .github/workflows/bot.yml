name: Rodar Bot de Canais

on:
  schedule:
    - cron: '0 * * * *' # Roda a cada hora exata
  workflow_dispatch: # Permite que você rode manualmente quando quiser

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install playwright aiohttp
          playwright install chromium

      - name: Rodar o bot
        run: python bot.python/bot.py

      - name: Salvar alterações
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add canaisgringos.html/lista_universal.json
          git commit -m "Atualizando canais automaticamente"
          git push
