<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cazé TV Ao Vivo</title>
    <!-- Carrega a biblioteca do player -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <style>
        body { 
            margin: 0; 
            background-color: #0a192f; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        .video-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
        }
        
        /* Player estilizado e responsivo */
        .video-js { 
            width: 80% !important; 
            max-width: 800px; 
            height: 450px !important; 
            border-radius: 15px; 
            border: 4px solid #fff; 
        }
        
        .btn-voltar { 
            margin-top: 20px; 
            padding: 12px 25px; 
            background: #00d4ff; 
            text-decoration: none; 
            color: black; 
            font-weight: bold; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>

    <div class="video-box">
        <h2>Cazé TV AO VIVO</h2>
        
        <!-- Player configurado com o link direto da Cazé TV -->
        <video id="meu-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay>
            <source src="https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/Caze_TV.m3u8" type="application/x-mpegURL">
        </video>
        
        <a href="index.html" class="btn-voltar">Voltar ao Menu</a>
    </div>

    <!-- Script necessário para rodar o vídeo -->
    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
</body>
</html>
