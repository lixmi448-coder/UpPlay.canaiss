<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Canais Gringos</title>
    <style>
        /* Paleta: Azul Marinho Profundo e Aconchegante */
        body { display: flex; height: 100vh; margin: 0; background: #0a0e1a; color: #e0e0e0; font-family: sans-serif; }
        
        #btn-voltar { position: absolute; top: 10px; left: 10px; z-index: 999; cursor: pointer; font-size: 20px; color: #8899aa; text-decoration: none; background: #161b2a; padding: 5px 12px; border-radius: 4px; border: 1px solid #2a3a50; }
        
        /* Sidebar mais escura que o fundo da tela */
        #sidebar { width: 450px; display: flex; flex-direction: column; background: #070a14; border-right: 1px solid #1a2535; }
        
        #topo-sidebar { height: 30%; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        #status-online { margin-top: 15px; margin-bottom: 15px; font-size: 13px; display: flex; align-items: center; gap: 8px; color: #4ade80; }
        .bolinha-verde { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; }
        
        #lista-canais { height: 70%; overflow-y: auto; padding: 10px; }
        
        /* Botões de canal com azul sóbrio */
        .canal-btn { display: flex; align-items: center; width: 100%; padding: 12px; margin-bottom: 6px; background: #111827; border: 1px solid #1e293b; color: #cbd5e1; cursor: pointer; border-radius: 5px; transition: background 0.3s; font-size: 14px; }
        .canal-btn:hover { background: #1e293b; border-color: #334155; }
        
        .num-canal { font-size: 11px; color: #64748b; margin-right: 12px; width: 20px; font-weight: bold; }
        .bandeira { font-size: 16px; margin-right: 10px; }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #0a0e1a; }
        #video-player { width: 100%; height: 80%; background: #000; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <a href="index.html" id="btn-voltar">← Voltar</a>

    <div id="sidebar">
        <div id="topo-sidebar">
            <script>atOptions = {'key':'3bd1bd43807e15df794b97ccde0fed87','format':'iframe','height':250,'width':300,'params':{}};</script>
            <script src="https://www.highperformanceformat.com/3bd1bd43807e15df794b97ccde0fed87/invoke.js"></script>
        </div>
        
        <div id="status-online"><div class="bolinha-verde"></div> <span id="contagem">0 canais online</span></div>
        
        <div id="lista-canais">Carregando...</div>
    </div>

    <div id="main-content">
        <iframe id="video-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const bandeiras = { "Estados Unidos": "🇺🇸", "Brasil": "🇧🇷", "Portugal": "🇵🇹", "Argentina": "🇦🇷", "Espanha": "🇪🇸" };

        fetch('canaisgringos.html/canais.json')
            .then(response => response.json())
            .then(dados => {
                const container = document.getElementById('lista-canais');
                container.innerHTML = ''; 
                
                let totalCanais = 0;
                let contadorNum = 1;

                // Ordenação: EUA primeiro, Brasil segundo, restante por ordem alfabética
                const chaves = Object.keys(dados);
                const paisesOrdenados = [
                    "Estados Unidos", 
                    "Brasil", 
                    ...chaves.filter(p => p !== "Estados Unidos" && p !== "Brasil").sort()
                ].filter(p => chaves.includes(p));

                paisesOrdenados.forEach(pais => {
                    const icone = bandeiras[pais] || "🌐";
                    for (let nomeCanal in dados[pais]) {
                        totalCanais++;
                        let btn = document.createElement('button');
                        btn.className = 'canal-btn';
                        btn.innerHTML = `<span class="num-canal">${contadorNum++}</span><span class="bandeira">${icone}</span> <span>${nomeCanal}</span>`;
                        btn.onclick = () => {
                            let link = dados[pais][nomeCanal];
                            document.getElementById('video-player').src = link.includes('?') ? link : link + '?autoplay=1';
                        };
                        container.appendChild(btn);
                    }
                });

                document.getElementById('contagem').innerText = `${totalCanais} canais online no momento`;
            })
            .catch(() => {
                document.getElementById('lista-canais').innerHTML = '<p style="color:#64748b; text-align:center;">Aguardando servidores...</p>';
            });
    </script>
</body>
</html>
