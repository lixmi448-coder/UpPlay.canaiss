<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Canais Gringos</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #000033; color: white; font-family: sans-serif; }
        
        #btn-voltar { position: absolute; top: 10px; left: 10px; z-index: 999; cursor: pointer; font-size: 24px; color: white; text-decoration: none; background: #000055; padding: 5px 10px; border-radius: 5px; }
        
        #sidebar { width: 450px; display: flex; flex-direction: column; border-right: 2px solid #000088; background: #000044; }
        
        #topo-sidebar { height: 30%; padding: 20px; border-bottom: 2px solid #000088; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        #status-online { margin-top: 20px; margin-bottom: 10px; font-size: 14px; display: flex; align-items: center; gap: 8px; color: #00ff00; font-weight: bold; }
        .bolinha-verde { width: 12px; height: 12px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; }
        
        #lista-canais { height: 70%; overflow-y: auto; padding: 10px; }
        
        .canal-btn { display: flex; align-items: center; width: 100%; padding: 10px; margin-bottom: 8px; background: #000066; border: 1px solid #0000aa; color: white; cursor: pointer; border-radius: 6px; transition: background 0.2s; font-size: 15px; }
        .canal-btn:hover { background: #000099; }
        
        .num-canal { font-size: 10px; color: #aaa; margin-right: 8px; width: 20px; }
        .bandeira { font-size: 18px; margin-right: 10px; }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #000022; }
        #video-player { width: 100%; height: 80%; background: #000; border: none; }
    </style>
</head>
<body>

    <a href="index.html" id="btn-voltar">←</a>

    <div id="sidebar">
        <div id="topo-sidebar">
            <script>atOptions = {'key':'3bd1bd43807e15df794b97ccde0fed87','format':'iframe','height':250,'width':300,'params':{}};</script>
            <script src="https://www.highperformanceformat.com/3bd1bd43807e15df794b97ccde0fed87/invoke.js"></script>
        </div>
        
        <div id="status-online"><div class="bolinha-verde"></div> <span id="contagem">0 canais online</span></div>
        
        <div id="lista-canais">Carregando canais...</div>
    </div>

    <div id="main-content">
        <!-- Autoplay ativado via allow="autoplay" -->
        <iframe id="video-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const bandeiras = {
            "Estados Unidos": "🇺🇸",
            "Brasil": "🇧🇷",
            "Portugal": "🇵🇹",
            "Argentina": "🇦🇷",
            "Espanha": "🇪🇸",
            "Reino Unido": "🇬🇧",
            "França": "🇫🇷"
        };

        fetch('canaisgringos.html/canais.json')
            .then(response => response.json())
            .then(dados => {
                const container = document.getElementById('lista-canais');
                const contador = document.getElementById('contagem');
                container.innerHTML = ''; 
                
                let totalCanais = 0;
                let contadorNum = 1;

                const ordemPreferencial = ["Estados Unidos", "Brasil"];
                const chaves = Object.keys(dados);
                
                const paisesOrdenados = [
                    ...ordemPreferencial.filter(p => chaves.includes(p)),
                    ...chaves.filter(p => !ordemPreferencial.includes(p))
                ];

                paisesOrdenados.forEach(pais => {
                    const icone = bandeiras[pais] || "🌐";
                    for (let nomeCanal in dados[pais]) {
                        totalCanais++;
                        let btn = document.createElement('button');
                        btn.className = 'canal-btn';
                        btn.innerHTML = `<span class="num-canal">${contadorNum++}</span><span class="bandeira">${icone}</span> <span>${nomeCanal}</span>`;
                        
                        // Função de clique com autoplay
                        btn.onclick = () => {
                            // Adicionamos ?autoplay=1 ao link caso o player suporte
                            let link = dados[pais][nomeCanal];
                            if (!link.includes('?')) link += '?autoplay=1';
                            document.getElementById('video-player').src = link;
                        };
                        container.appendChild(btn);
                    }
                });

                contador.innerText = `${totalCanais} canais online no momento`;
            })
            .catch(err => {
                console.error(err);
                document.getElementById('lista-canais').innerHTML = '<p style="color:#ffaa00; text-align:center;">Aguardando servidores...</p>';
            });
    </script>
</body>
</html>
