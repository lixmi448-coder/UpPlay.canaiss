<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Canais Gringos</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #000033; color: white; font-family: sans-serif; }
        
        /* Botão Voltar */
        #btn-voltar { position: absolute; top: 10px; left: 10px; z-index: 999; cursor: pointer; font-size: 24px; color: white; text-decoration: none; background: #000055; padding: 5px 10px; border-radius: 5px; }
        
        /* Lateral Esquerda - Fundo um pouco mais claro que o principal */
        #sidebar { width: 350px; display: flex; flex-direction: column; border-right: 2px solid #000088; background: #000044; }
        
        #topo-sidebar { height: 50%; padding: 30px 15px 15px 15px; border-bottom: 2px solid #000088; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #lista-canais { height: 50%; overflow-y: auto; padding: 10px; }
        
        .canal-btn { display: flex; align-items: center; width: 100%; padding: 10px; margin-bottom: 8px; background: #000066; border: 1px solid #0000aa; color: white; cursor: pointer; border-radius: 6px; transition: background 0.2s; }
        .canal-btn:hover { background: #000099; }
        .bandeira { font-size: 20px; margin-right: 12px; }

        /* Direita: Player de vídeo */
        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #000022; }
        #video-player { width: 100%; height: 90%; background: #000; border: none; }
    </style>
</head>
<body>

    <a href="index.html" id="btn-voltar">←</a>

    <div id="sidebar">
        <div id="topo-sidebar">
            <script>
                atOptions = {
                    'key' : '3bd1bd43807e15df794b97ccde0fed87',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/3bd1bd43807e15df794b97ccde0fed87/invoke.js"></script>
        </div>
        
        <div id="lista-canais">
            Carregando lista de canais...
        </div>
    </div>

    <div id="main-content">
        <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        // O caminho deve ser relativo à raiz do site
        fetch('bot.python/canaisgringos.html/canais.json')
            .then(response => {
                if (!response.ok) throw new Error('Status: ' + response.status);
                return response.json();
            })
            .then(dados => {
                const container = document.getElementById('lista-canais');
                container.innerHTML = ''; 
                for (let pais in dados) {
                    for (let nomeCanal in dados[pais]) {
                        let btn = document.createElement('button');
                        btn.className = 'canal-btn';
                        btn.innerHTML = `<span class="bandeira">🌐</span> <span>${nomeCanal}</span>`;
                        btn.onclick = () => { document.getElementById('video-player').src = dados[pais][nomeCanal]; };
                        container.appendChild(btn);
                    }
                }
            })
            .catch(err => {
                console.error("Erro detalhado:", err);
                document.getElementById('lista-canais').innerHTML = 
                '<p style="color:yellow; text-align:center; padding:10px;">Erro ao carregar canais.<br>Verifique se o arquivo JSON está acessível no caminho: bot.python/canaisgringos.html/canais.json</p>';
            });
    </script>
</body>
</html>
