<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpPlay Canaiss</title>
    <style>
        body { 
            margin: 0; 
            background-color: #001a4d; 
            /* Caminho corrigido para a pasta imagens */
            background-image: url('imagens/fundo.png'); 
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
        }
        
        h1 { margin-top: 50px; text-shadow: 2px 2px 4px #000; }

        .grid-canais { display: flex; justify-content: center; gap: 20px; padding: 50px; flex-wrap: wrap; }
        .canal-item { cursor: pointer; width: 150px; transition: 0.3s; }
        .canal-item:hover { transform: scale(1.1); }
        
        /* Caminho corrigido para a pasta imagens */
        .canal-item img { width: 100%; border-radius: 15px; border: 2px solid #00d4ff; background-color: #fff; }

        #player-area { display: none; padding: 20px; }
        .voltar { margin-top: 20px; padding: 12px 25px; background: #00d4ff; color: black; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="home">
        <h1>Escolha um canal</h1>
        <div class="grid-canais">
            <div class="canal-item" onclick="carregarCanal('https://www.youtube.com/embed/LLpNUqHVam8', 'SBT')">
                <img src="imagens/sbt.png" alt="SBT">
            </div>
            </div>
    </div>

    <div id="player-area">
        <h2 id="nome-canal"></h2>
        <div style="background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; display: inline-block;">
            <iframe id="iframe-canal" width="800" height="450" frameborder="0" allowfullscreen></iframe>
        </div>
        <br>
        <button class="voltar" onclick="voltarHome()">Voltar ao Menu</button>
    </div>

    <script>
        function carregarCanal(url, nome) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('player-area').style.display = 'block';
            document.getElementById('iframe-canal').src = url;
            document.getElementById('nome-canal').innerText = nome;
        }

        function voltarHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('player-area').style.display = 'none';
            document.getElementById('iframe-canal').src = "";
        }
    </script>
</body>
</html>
