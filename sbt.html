<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SBT Ao Vivo</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        
        .video-box { flex: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        iframe { width: 80%; height: 500px; border-radius: 15px; border: 4px solid #fff; }
        
        .sidebar { 
            flex: 1; 
            background: #1a1a1a; 
            padding: 20px; 
            border-left: 2px solid #00d4ff;
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        
        /* Ajustes do container e remoção da borda */
        .banner-container {
            width: 300px;
            height: 250px;
            margin-bottom: 50px; /* Aumentei a margem para descer o texto */
            border: none;        /* Remove qualquer borda */
        }

        /* Força o iframe a não ter borda */
        iframe[src*="highperformanceformat"] {
            border: none !important;
        }

        .btn-voltar { display: block; margin-top: 20px; padding: 10px; background: #00d4ff; text-decoration: none; color: black; font-weight: bold; text-align: center; border-radius: 5px; }
        
        .programacao { width: 100%; text-align: left; }
    </style>
</head>
<body>
    <div class="video-box">
        <h2>SBT AO VIVO</h2>
        <iframe src="https://www.youtube.com/embed/LLpNUqHVam8" frameborder="0" allowfullscreen></iframe>
        <a href="index.html" class="btn-voltar">Voltar ao Menu</a>
    </div>

    <div class="sidebar">
        <div class="banner-container">
            <script type="text/javascript">
                atOptions = {
                    'key' : '3bd1bd43807e15df794b97ccde0fed87',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/3bd1bd43807e15df794b97ccde0fed87/invoke.js"></script>
        </div>

        <div class="programacao">
            <h3>Programação</h3>
            <p>14:00 - Fofocalizando</p>
            <hr>
        </div>
    </div>
</body>
</html>
