<div class="canal" onclick="ativarAnuncio('sbt.html')">
    <img src="imagens/sbt.png" alt="SBT">
</div>

<script>
    function ativarAnuncio(urlDestino) {
        // 1. Cria o script do anúncio dinamicamente apenas no clique
        var script = document.createElement('script');
        script.src = "https://pl30304887.effectivecpmnetwork.com/dd/0a/9f/dd0a9f5cf0ee8e5fb39546a26d6aa388.js";
        script.async = true;
        
        // 2. Adiciona ao documento
        document.body.appendChild(script);
        
        // 3. Aguarda um curto tempo (500ms) para o anúncio carregar 
        // e redireciona para a página do canal
        setTimeout(function() {
            window.location.href = urlDestino;
        }, 500);
    }
</script>
