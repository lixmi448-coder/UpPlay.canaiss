<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpPlay Canais</title>
    <style>
        body { 
            margin: 0; 
            background: url('imagens/fundo.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: sans-serif; 
            color: white; 
            padding: 20px;
        }

        h1 { margin-left: 20px; }

        .grid-canais { 
            display: flex; 
            /* Alinha os itens à esquerda, como um catálogo */
            justify-content: flex-start; 
            /* Permite que, ao adicionar mais canais, eles pulem para a linha de baixo */
            flex-wrap: wrap; 
            gap: 20px; 
            padding: 20px;
        }

        .canal { 
            cursor: pointer; 
            /* Aumentei o tamanho de 100px para 150px */
            width: 150px; 
            height: 150px; 
            transition: 0.3s;
        }

        .canal:hover { 
            transform: scale(1.1); 
        }

        .canal img { 
            width: 100%; 
            height: 100%; 
            border-radius: 15px; 
            border: 3px solid #00d4ff; 
            background-color: white; 
            object-fit: cover; /* Faz a imagem preencher o quadrado todo */
        }
    </style>
</head>
<body>

    <h1>Canais Disponíveis</h1>

    <div class="grid-canais">
        <!-- Ícone SBT -->
        <div class="canal" onclick="ativarAnuncio('sbt.html')">
            <img src="imagens/sbt.png" alt="SBT">
        </div>
        
        <!-- Quando tiver mais canais, é só copiar e colar essa div aqui dentro -->
    </div>

    <script>
        function ativarAnuncio(urlDestino) {
            window.location.href = urlDestino;
        }
    </script>
</body>
</html>
