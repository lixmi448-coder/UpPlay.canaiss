<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpPlay Canais</title>
    <style>
        body { 
            margin: 0; 
            background: url('imagens/fundo.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: sans-serif; 
            color: white; 
            padding: 20px;
        }

        h1 { margin-left: 20px; }

        .grid-canais { 
            display: flex; 
            justify-content: flex-start; 
            flex-wrap: wrap; 
            gap: 20px; 
            padding: 20px;
        }

        .canal { 
            cursor: pointer; 
            width: 150px; 
            height: 150px; 
            transition: 0.3s;
        }

        .canal:hover { 
            transform: scale(1.1); 
        }

        .canal img { 
            width: 100%; 
            height: 100%; 
            border-radius: 15px; 
            border: 3px solid #00d4ff; 
            background-color: white; 
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <h1>Canais Disponíveis</h1>

    <div class="grid-canais">
        <!-- O link agora chama o anúncio diretamente na página -->
        <a href="https://www.effectivecpmnetwork.com/zui6qrvvy?key=1a86e4316840f3397af2438649315a4a" target="_blank" onclick="setTimeout(function(){ window.location.href='sbt.html'; }, 1000);">
            <div class="canal">
                <img src="imagens/sbt.png" alt="SBT">
            </div>
        </a>
    </div>

</body>
</html>
