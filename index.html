<body>
    <h1>Escolha um Canal</h1>
    
    <div class="grid-canais">
        <!-- Verifique se o arquivo está na pasta 'imagens' com o nome 'sbt.png' -->
        <div class="canal" onclick="ativarAnuncio('sbt.html')">
            <img src="imagens/sbt.png" alt="SBT" onerror="this.style.display='none'; alert('Imagem não encontrada!');">
        </div>
    </div>

    <script>
        function ativarAnuncio(urlDestino) {
            window.location.href = urlDestino;
        }
    </script>
</body>
