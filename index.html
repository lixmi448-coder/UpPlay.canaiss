<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpPlay Canais</title>
    <style>
        body { 
            margin: 0; 
            background: url('imagens/fundo.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: sans-serif; 
            text-align: center; 
            color: white; 
        }

        h1 { margin-top: 20px; }

        .grid-canais { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            padding: 50px; 
            flex-wrap: wrap;
        }

        .canal { 
            cursor: pointer; 
            width: 100px; 
            height: 100px; 
            transition: 0.3s;
        }

        .canal:hover { 
            transform: scale(1.1); 
        }

        .canal img { 
            width: 100%; 
            height: 100%; 
            border-radius: 15px; 
            border: 2px solid #00d4ff; 
            background-color: white; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <h1>Escolha um Canal</h1>

    <div class="grid-canais">
        <div class="canal" onclick="ativarAnuncio('sbt.html')">
            <img src="imagens/sbt.png" alt="SBT">
        </div>
    </div>

    <script>
        function ativarAnuncio(urlDestino) {
            // Redireciona para o SBT
            window.location.href = urlDestino;
        }
    </script>
</body>
</html>
