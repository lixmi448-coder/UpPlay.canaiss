<style>
    body { 
        margin: 0; 
        background: url('imagens/fundo.png') no-repeat center center fixed; 
        background-size: cover; 
        font-family: sans-serif; 
        text-align: center; 
        color: white; 
    }

    .grid-canais { 
        display: flex; /* Mudamos de grid para flex para ser mais fácil controlar */
        justify-content: center; 
        gap: 30px; 
        padding: 50px; 
        flex-wrap: wrap;
    }

    .canal { 
        cursor: pointer; 
        width: 100px; /* Tamanho fixo e pequeno */
        height: 100px; /* Mantém o quadrado */
        transition: 0.3s;
    }

    .canal:hover { 
        transform: scale(1.1); 
    }

    .canal img { 
        width: 100%; 
        height: 100%; /* Força a imagem a preencher o espaço da div */
        border-radius: 15px; 
        border: 2px solid #00d4ff; 
        background-color: white; 
        object-fit: contain; /* Garante que a logo inteira apareça sem cortar */
    }
</style>
