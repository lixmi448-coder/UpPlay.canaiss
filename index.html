<style>
    body { 
        margin: 0; 
        background: url('imagens/fundo.png') no-repeat center center fixed; 
        background-size: cover; 
        font-family: sans-serif; 
        text-align: center; 
        color: white; 
    }

    .grid-canais { 
        display: grid; 
        /* Diminuímos o tamanho das colunas para os ícones ficarem menores */
        grid-template-columns: repeat(auto-fit, 100px); 
        justify-content: center; 
        gap: 30px; 
        padding: 50px; 
    }

    .canal { 
        transition: 0.3s; 
        cursor: pointer; 
        width: 100px; /* Tamanho final do ícone na tela */
        margin: auto;
    }

    .canal:hover { 
        transform: scale(1.1); 
    }

    .canal img { 
        width: 100%; 
        border-radius: 15px; 
        border: 2px solid #00d4ff; 
        background-color: white; /* Mantém o fundo branco se o PNG for transparente */
    }
</style>
