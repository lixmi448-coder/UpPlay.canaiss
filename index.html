<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpPlay Canais</title>
    <style>
        body { 
            margin: 0; 
            background: url('imagens/fundo.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: sans-serif; 
            color: white; 
            padding: 20px;
        }

        .header-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 30px; 
        }

        h1 { margin-bottom: 20px; }

        /* Estilo da caixa do anúncio */
        .banner-ad { 
            margin: 20px 0; 
            min-height: 90px; 
            display: flex; 
            justify-content: center; 
        }

        .grid-canais { 
            display: flex; 
            justify-content: flex-start; 
            flex-wrap: wrap; 
            gap: 20px; 
            padding: 20px;
        }

        .canal { 
            cursor: pointer; 
            width: 150px; 
            height: 150px; 
            transition: 0.3s;
        }

        .canal:hover { transform: scale(1.1); }

        .canal img { 
            width: 100%; 
            height: 100%; 
            border-radius: 15px; 
            border: 3px solid #00d4ff; 
            background-color: white; 
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Canais Disponíveis</h1>
        
        <!-- Banner de Anúncio Adsterra -->
        <div class="banner-ad">
            <script type="text/javascript">
                atOptions = {
                    'key' : '1a86e4316840f3397af2438649315a4a',
                    'format' : 'iframe',
                    'height' : 90,
                    'width' : 728,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="//www.effectivecpmnetwork.com/1a86e4316840f3397af2438649315a4a/invoke.js"></script>
        </div>
    </div>

    <div class="grid-canais">
        <!-- Canal SBT -->
        <div class="canal" onclick="window.location.href='sbt.html'">
            <img src="imagens/sbt.png" alt="SBT">
        </div>

        <!-- Canal Record -->
        <div class="canal" onclick="window.location.href='record.html'">
            <img src="imagens/record.png" alt="Record TV">
        </div>

        <!-- Canal TV Brasil -->
        <div class="canal" onclick="window.location.href='tvbrasil.html'">
            <img src="imagens/tvbrasil.png" alt="TV Brasil">
        </div>
    </div>

</body>
</html>
