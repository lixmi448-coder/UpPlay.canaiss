<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpTV - Teste</title>
    <style>
        /* Fundo fixo e responsivo */
        body { 
            margin: 0; 
            background-image: url('fundo.png');
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            color: white; 
            font-family: sans-serif; 
        }
        
        .main-wrapper { 
            display: flex; 
            padding: 20px; 
            gap: 20px; 
            max-width: 1200px; 
            margin: auto; 
            margin-top: 50px;
        }

        .video-column { flex: 3; }
        
        .video-box { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #00d4ff;
        }

        .side-column { 
            flex: 1; 
            background: rgba(0, 30, 80, 0.7); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #00d4ff;
        }

        iframe { width: 100%; height: 450px; border-radius: 8px; }
        
        .logo-canal { width: 150px; margin-bottom: 15px; display: block; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="video-column">
            <img src="sbt.png" alt="SBT" class="logo-canal">
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/LLpNUqHVam8" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="side-column">
            <h3>Programação</h3>
            <ul>
                <li>13:00 - Fofocalizando</li>
                <li>15:00 - Novelas</li>
                <li>19:45 - SBT Brasil</li>
            </ul>
            <hr>
            <h3>Anúncios</h3>
            <div style="background: #fff; color: #000; padding: 10px; border-radius: 5px; text-align: center;">
                Espaço Publicitário
            </div>
        </div>
    </div>

</body>
</html>
