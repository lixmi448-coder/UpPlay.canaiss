<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UpPlay - Catálogo</title>
    <style>
        body { margin: 0; background: url('imagens/fundo.png') no-repeat center center fixed; background-size: cover; font-family: sans-serif; text-align: center; color: white; }
        .grid-canais { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 30px; padding: 50px; max-width: 900px; margin: auto; }
        .canal { transition: 0.3s; cursor: pointer; }
        .canal:hover { transform: scale(1.1); }
        .canal img { width: 100%; border-radius: 20px; border: 3px solid #00d4ff; }
    </style>
</head>
<body>
    <h1>Escolha um Canal</h1>
    <div class="grid-canais">
        <a href="sbt.html" class="canal"><img src="imagens/sbt.png" alt="SBT"></a>
        </div>
</body>
</html>
