<!DOCTYPE html>

    <style>
        body { margin: 0; background: url('imagens/fundo.png') no-repeat left top fixed; background-size: cover; font-family: sans-serif; color: white; padding: 20px; }
        .header-container { display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 30px; }
        
        /* Estilo da barra de pesquisa e área de busca */
        .search-container { margin-bottom: 20px; width: 100%; max-width: 400px; text-align: center; }
        .search-container input { width: 100%; padding: 12px; border-radius: 20px; border: none; outline: none; }
        #resultados-busca { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .item-busca { cursor: pointer; text-align: center; width: 80px; }
        .item-busca img { width: 60px; height: 60px; border-radius: 10px; border: 2px solid #00d4ff; }

        .banner-ad { margin: 20px 0; min-height: 90px; }
        .grid-canais { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .canal { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 150px; transition: 0.3s; }
        .canal:hover { transform: scale(1.1); }
        .canal img { width: 150px; height: 150px; border-radius: 15px; border: 3px solid #00d4ff; background-color: white; object-fit: cover; }
        .nome-canal { margin-top: 8px; font-weight: bold; text-shadow: 1px 1px 2px #000; font-size: 14px; }
        .linha-aba { margin-top: 30px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .aba img { width: 400px; height: 150px; border-radius: 15px; border: 3px solid #00d4ff; object-fit: contain; background: white; cursor: pointer; }
        .footer-data { text-align: center; font-size: 9px; color: #555; margin-top: 50px; }
    </style>
</head>
<body>

            <input type="text" id="campoBusca" placeholder="Pesquisar canal..." oninput="filtrarCanais()">

                atOptions = {'key' : '1a86e4316840f3397af2438649315a4a', 'format' : 'iframe', 'height' : 90, 'width' : 728};

            <script type="text/javascript" src="//www.effectivecpmnetwork.com/1a86e4316840f3397af2438649315a4a/invoke.js"></script>
        </div>
    </div>

    <!-- Grade Superior Ordenada -->
    <div class="grid-canais" id="lista-canais">
        <div class="canal" data-nome="sbt" onclick="window.location.href='sbt.html'"><img src="imagens/sbt.png"><span class="nome-canal">SBT</span></div>
        <div class="canal" data-nome="record" onclick="window.location.href='record.html'"><img src="imagens/record.png"><span class="nome-canal">Record TV</span></div>
        <div class="canal" data-nome="cultura" onclick="window.location.href='tvcultura.html'"><img src="imagens/tvcultura.png"><span class="nome-canal">TV Cultura</span></div>
        <div class="canal" data-nome="band" onclick="window.location.href='band.html'"><img src="imagens/band.png"><span class="nome-canal">Band</span></div>
        <div class="canal" data-nome="caze" onclick="window.location.href='cazetv.html'"><img src="imagens/cazetv.png"><span class="nome-canal">Caze TV</span></div>
        <div class="canal" data-nome="tv brasil" onclick="window.location.href='tvbrasil.html'"><img src="imagens/tvbrasil.png"><span class="nome-canal">TV Brasil</span></div>
        <div class="canal" data-nome="boomerang" onclick="window.location.href='boomerang.html'"><img src="imagens/boomerang.png"><span class="nome-canal">Boomerang</span></div>
        <div class="canal" data-nome="niktoons" onclick="window.location.href='NIKTOONS.html'"><img src="imagens/nik.png"><span class="nome-canal">Niktoons</span></div>
        <div class="canal" data-nome="adrenalina" onclick="window.location.href='adrenalinapura.html'"><img src="imagens/adrenalinapura.png"><span class="nome-canal">Adrenalina</span></div>
        <div class="canal" data-nome="wording" onclick="window.location.href='wording.html'"><img src="imagens/wording.png"><span class="nome-canal">Wording</span></div>
    </div>

    <!-- Abas -->
    <div class="linha-aba">
        <div class="aba" onclick="window.location.href='filmes.html'"><img src="imagens/filmes.png"></div>
        <div class="aba" onclick="window.location.href='gringos.html'"><img src="imagens/gringos.png"></div>
    </div>

    <div class="linha-aba">
        <div class="aba" onclick="window.location.href='desenhos.html'"><img src="imagens/desenhos.png"></div>
        <div class="aba" onclick="window.location.href='canaisbr.html'"><img src="imagens/canaisbr.png"></div>
    </div>

    <!-- Grid Inferior (Demais) -->
    <div class="grid-canais" style="margin-top: 40px;">
        <div class="canal" onclick="window.location.href='cnnbrasil.html'"><img src="imagens/cnnbrasil.png"><span class="nome-canal">CNN Brasil</span></div>
        <div class="canal" onclick="window.location.href='picapau.html'"><img src="imagens/picapau.png"><span class="nome-canal">Pica-Pau</span></div>
        <div class="canal" onclick="window.location.href='tom.html'"><img src="imagens/tom (2).png"><span class="nome-canal">Tom e Jerry</span></div>
        <div class="canal" onclick="window.location.href='canalgov.html'"><img src="imagens/gov.png"><span class="nome-canal">Canal Gov</span></div>
        <div class="canal" onclick="window.location.href='mrbean.html'"><img src="imagens/bean.png"><span class="nome-canal">Mr Bean</span></div>
        <div class="canal" onclick="window.location.href='lifeamerica.html'"><img src="imagens/lifeamerica.png"><span class="nome-canal">Life America</span></div>
        <div class="canal" onclick="window.location.href='passofundo.html'"><img src="imagens/passofundo.png"><span class="nome-canal">Passo Fundo</span></div>
        <div class="canal" onclick="window.location.href='tvaldeia.html'"><img src="imagens/tvaldeia.png"><span class="nome-canal">TV Aldeia</span></div>
    </div>

    <script>
        function filtrarCanais() {
            const busca = document.getElementById('campoBusca').value.toLowerCase();
            const resultados = document.getElementById('resultados-busca');
            const canais = document.querySelectorAll('.grid-canais .canal');
            resultados.innerHTML = '';
            
            if (busca === '') return;

            let cont = 0;
            canais.forEach(canal => {
                const nome = canal.getAttribute('data-nome');
                if (nome.includes(busca) && cont < 3) {
                    const clone = canal.cloneNode(true);
                    clone.className = 'item-busca';
                    resultados.appendChild(clone);
                    cont++;
                }
            });
        }
    </script>

    <div class="footer-data">Última atualização: 18/07/2026</div>
</body>
