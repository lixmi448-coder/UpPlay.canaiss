<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpPlay Canais</title>
    <style>
        body { 
            margin: 0; 
            background: url('imagens/fundo.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: sans-serif; 
            color: white; 
            padding: 20px;
        }

        h1 { margin-left: 20px; }

        .grid-canais { 
            display: flex; 
            justify-content: flex-start; 
            flex-wrap: wrap; 
            gap: 20px; 
            padding: 20px;
        }

        .canal { 
            cursor: pointer; 
            width: 150px; 
            height: 150px; 
            transition: 0.3s;
        }

        .canal:hover { 
            transform: scale(1.1); 
        }

        .canal img { 
            width: 100%; 
            height: 100%; 
            border-radius: 15px; 
            border: 3px solid #00d4ff; 
            background-color: white; 
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <h1>Canais Disponíveis</h1>

    <div class="grid-canais">
        <div class="canal" onclick="executarAcao('sbt.html')">
            <img src="imagens/sbt.png" alt="SBT">
        </div>
    </div>

    <script>
        function executarAcao(urlDestino) {
            // 1. Tenta abrir o anúncio da Adsterra em uma nova aba
            // O navegador permite isso por causa do evento de clique
            window.open("https://pl30304887.effectivecpmnetwork.com/dd/0a/9f/dd0a9f5cf0ee8e5fb39546a26d6aa388.js", "_blank");

            // 2. Aguarda 500ms para o anúncio disparar e então muda a página
            setTimeout(function() {
                window.location.href = urlDestino;
            }, 500);
        }
    </script>
</body>
</html>
