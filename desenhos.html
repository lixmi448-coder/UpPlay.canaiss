<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenhos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Fundo configurado com a imagem fundo3.png da pasta imagens */
            background: url('imagens/fundo3.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
        }
        
        h1 {
            text-shadow: 2px 2px 4px #000;
        }
        
        .btn-voltar {
            margin-top: 30px;
            padding: 15px 30px;
            background: #00d4ff;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid white;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            transform: scale(1.1);
            background: white;
        }
    </style>
</head>
<body>

    <h1>Seção de Desenhos</h1>
    <p>Escolha o seu conteúdo abaixo:</p>

    <!-- Adicione seus links de desenhos aqui -->
    
    <a href="index.html" class="btn-voltar">Voltar ao Menu</a>

</body>
</html>
